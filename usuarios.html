<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Usuarios – SmartBook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Colores personalizados -->
  <script src="js/tailwind.config.js"></script>

  <style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .card-shadow {
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
      animation: fadeInUp 0.6s ease-out;
    }
    
    .logo-animate {
      animation: fadeIn 0.8s ease-out;
    }
    
    .input-focus {
      transition: all 0.3s ease;
    }
    
    .input-focus:focus {
      border-color: #e12d2e;
      box-shadow: 0 0 0 3px rgba(225, 45, 46, 0.1);
      transform: translateY(-2px);
    }
    
    .sidebar-link {
      transition: all 0.2s ease;
    }
    
    .sidebar-link:hover {
      transform: translateX(5px);
    }
    
    .btn-primary {
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px -3px rgba(225, 45, 46, 0.3);
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-active {
      background-color: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    
    .status-inactive {
      background-color: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    
    .role-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .role-admin {
      background-color: #fef3f2;
      color: #e12d2e;
      border: 1px solid #fecaca;
    }
    
    .role-vendedor {
      background-color: #f0f9ff;
      color: #4142a1;
      border: 1px solid #bae6fd;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- ==================== -->
  <!-- PROTECCIÓN DE RUTA -->
  <!-- ==================== -->
  <script>
    const auth = JSON.parse(localStorage.getItem("smartbook_auth") || sessionStorage.getItem("smartbook_auth"));

    if (!auth || !auth.token) {
      window.location.href = "login.html";
    }

    // VALIDAR ROL CORRECTAMENTE (Admin = 1)
    if (auth.usuario?.rol !== "Admin") {
      alert("Acceso denegado. Solo administradores.");
      window.location.href = "dashboard.html";
    }
  </script>

  <div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white h-screen shadow-lg fixed top-0 left-0 flex flex-col z-10">
      <!-- Logo -->
      <div class="p-6 flex flex-col items-center border-b">
        <img src="images/logocecar.png" alt="SmartBook Logo" class="h-12 w-auto mb-4 logo-animate">
        <h1 class="text-xl font-bold text-gray-700">SmartBook</h1>
      </div>

      <!-- Menú de navegación -->
      <nav class="flex-1 p-4 space-y-2 text-gray-700">
        <a href="dashboard.html" class="sidebar-link block px-4 py-3 rounded-lg hover:bg-primary/10 transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
          </span>
        </a>
        
        <a href="clientes.html" class="sidebar-link block px-4 py-3 rounded-lg hover:bg-primary/10 transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Clientes
          </span>
        </a>
        
        <a href="libros.html" class="sidebar-link block px-4 py-3 rounded-lg hover:bg-primary/10 transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            Libros
          </span>
        </a>
        
        <a href="inventario.html" class="sidebar-link block px-4 py-3 rounded-lg hover:bg-primary/10 transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7.5 4.27 9 5.15"></path>
              <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
              <path d="m3.3 7 8.7 5 8.7-5"></path>
              <path d="M12 22V12"></path>
            </svg>
            Inventario
          </span>
        </a>
        
        <a href="ventas.html" class="sidebar-link block px-4 py-3 rounded-lg hover:bg-primary/10 transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            Ventas
          </span>
        </a>

        <!-- ACTIVAR SOLO PARA ADMIN -->
        <a id="adminMenu" href="usuarios.html"
          class="sidebar-link block px-4 py-3 rounded-lg bg-primary text-white font-medium transition-all">
          <span class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Usuarios
          </span>
        </a>
      </nav>

      <!-- Botón de cierre de sesión -->
      <div class="p-4 border-t">
        <button id="logout" class="w-full py-3 bg-primary text-white rounded-lg hover:bg-red-700 transition-all flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16,17 21,12 16,7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- CONTENIDO -->
    <main class="ml-64 p-8 w-full">

      <!-- Header -->
      <header class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold text-gray-700">Gestión de Usuarios</h2>
          <p class="text-gray-500 text-sm">Administra los usuarios del sistema SmartBook</p>
        </div>

        <button id="openModalBtn"
          class="btn-primary px-5 py-3 bg-primary text-white font-semibold rounded-lg shadow flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="M12 5v14"></path>
          </svg>
          Nuevo Usuario
        </button>
      </header>

      <!-- TABLA DE USUARIOS -->
      <div class="bg-white card-shadow rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-secondary text-white">
              <tr>
                <th class="p-4 font-semibold">Identificación</th>
                <th class="p-4 font-semibold">Nombre</th>
                <th class="p-4 font-semibold">Email</th>
                <th class="p-4 font-semibold">Rol</th>
                <th class="p-4 font-semibold">Estado</th>
                <th class="p-4 font-semibold">Acciones</th>
              </tr>
            </thead>
            <tbody id="usuariosTable" class="divide-y">
              <!-- Contenido dinámico -->
              <tr>
                <td colspan="6" class="p-8 text-center text-gray-500">
                  <div class="flex justify-center">
                    <div class="h-8 w-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                  </div>
                  <p class="mt-2">Cargando usuarios...</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL NUEVO / EDITAR -->
  <div id="modal"
    class="hidden fixed inset-0 bg-black/50 flex justify-center items-center z-50 backdrop-blur-sm p-4"
    style="animation: fadeIn 0.3s ease-out;">

    <div class="bg-white w-full max-w-lg rounded-xl shadow-xl overflow-hidden"
         style="animation: slideDown 0.3s ease-out;">
      
      <!-- Header del modal -->
      <div class="bg-primary text-white p-6">
        <h3 id="modalTitle" class="text-xl font-bold">Registrar Usuario</h3>
      </div>

      <!-- Formulario -->
      <form id="usuarioForm" class="p-6 space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Identificación</label>
          <input id="identificacion" class="input-focus w-full p-3 border border-gray-300 rounded-lg focus:outline-none"
            placeholder="Número de identificación" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nombres completos</label>
          <input id="nombres" class="input-focus w-full p-3 border border-gray-300 rounded-lg focus:outline-none"
            placeholder="Nombres y apellidos" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Correo electrónico</label>
          <input id="email" type="email" class="input-focus w-full p-3 border border-gray-300 rounded-lg focus:outline-none"
            placeholder="correo@ejemplo.com" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
          <input id="password" type="password" class="input-focus w-full p-3 border border-gray-300 rounded-lg focus:outline-none"
            placeholder="Contraseña segura" required>
          <p class="text-xs text-gray-500 mt-1" id="passwordHelp">Mínimo 6 caracteres</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Rol</label>
          <select id="rol" class="input-focus w-full p-3 border border-gray-300 rounded-lg focus:outline-none" required>
            <option value="">Seleccione un rol</option>
            <option value="1">Administrador</option>
            <option value="2">Vendedor</option>
          </select>
        </div>

        <div class="flex justify-end gap-3 pt-4">
          <button type="button" id="closeModalBtn" 
                  class="px-5 py-2.5 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors">
            Cancelar
          </button>
          <button type="submit" 
                  class="btn-primary px-5 py-2.5 bg-primary text-white rounded-lg hover:bg-red-700 shadow">
            Guardar Usuario
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- ================== -->
  <!-- SCRIPT PRINCIPAL -->
  <!-- ================== -->
  <script>
    const API_SEG = "https://smartbook.runasp.net/api/Seguridad";
    const API_USERS = "https://smartbook.runasp.net/api/Usuarios";
    const token = auth.token;

    // ACTIVAR MENÚ ADMIN
    const adminMenu = document.getElementById("adminMenu");
    if (auth.usuario?.rol === "Admin") adminMenu.classList.remove("hidden");

    const usuariosTable = document.getElementById("usuariosTable");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const usuarioForm = document.getElementById("usuarioForm");
    const openModalBtn = document.getElementById("openModalBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const identificacion = document.getElementById("identificacion");
    const nombres = document.getElementById("nombres");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const rol = document.getElementById("rol");
    const passwordHelp = document.getElementById("passwordHelp");

    let editId = null;

    // ---------------------------
    // Abrir modal
    // ---------------------------
    openModalBtn.onclick = () => {
      editId = null;
      usuarioForm.reset();
      password.disabled = false;
      passwordHelp.textContent = "Mínimo 6 caracteres";
      modalTitle.textContent = "Registrar Usuario";
      modal.classList.remove("hidden");
    };

    closeModalBtn.onclick = () => modal.classList.add("hidden");

    // Cerrar modal al hacer clic fuera
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.add("hidden");
      }
    });

    // ---------------------------
    // Cargar usuarios
    // ---------------------------
    async function cargarUsuarios() {
      try {
        const res = await fetch(API_USERS, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Error al cargar usuarios');

        const data = await res.json();
        
        if (data.length === 0) {
          usuariosTable.innerHTML = `
            <tr>
              <td colspan="6" class="p-8 text-center text-gray-500">
                <div class="flex flex-col items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2 text-gray-400">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                  </svg>
                  <p>No hay usuarios registrados</p>
                  <p class="text-sm">Haz clic en "Nuevo Usuario" para agregar el primero</p>
                </div>
              </td>
            </tr>
          `;
          return;
        }

        usuariosTable.innerHTML = "";

        data.forEach(u => {
          const tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50 transition-colors';
          tr.innerHTML = `
            <td class="p-4 font-medium text-gray-900">${u.identificacion}</td>
            <td class="p-4">${u.nombres}</td>
            <td class="p-4">${u.email}</td>
            <td class="p-4">
              <span class="role-badge ${u.rol === 'Admin' ? 'role-admin' : 'role-vendedor'}">
                ${u.rol}
              </span>
            </td>
            <td class="p-4">
              <span class="status-badge ${u.activo ? 'status-active' : 'status-inactive'}">
                ${u.activo ? 'Activo' : 'Inactivo'}
              </span>
            </td>
            <td class="p-4">
              <div class="flex gap-3">
                <button class="text-primary font-semibold hover:text-red-700 transition-colors flex items-center gap-1" 
                        onclick="editarUsuario(${u.id})">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                  </svg>
                  Editar
                </button>
                <button class="text-secondary font-semibold hover:text-blue-800 transition-colors flex items-center gap-1" 
                        onclick="cambiarEstado(${u.id})">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 12l2 2 4-4"/>
                    <path d="M5 7c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2v12H5V7Z"/>
                  </svg>
                  ${u.activo ? "Desactivar" : "Activar"}
                </button>
              </div>
            </td>
          `;
          usuariosTable.appendChild(tr);
        });

      } catch (error) {
        console.error('Error:', error);
        usuariosTable.innerHTML = `
          <tr>
            <td colspan="6" class="p-8 text-center text-red-500">
              <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-2">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p>Error al cargar los usuarios</p>
                <button onclick="cargarUsuarios()" class="mt-2 text-primary hover:underline">Reintentar</button>
              </div>
            </td>
          </tr>
        `;
      }
    }

    // ---------------------------
    // Editar usuario
    // ---------------------------
    async function editarUsuario(id) {
      try {
        editId = id;
        modalTitle.textContent = "Editar Usuario";
        password.disabled = true;
        passwordHelp.textContent = "La contraseña no se puede editar";

        const res = await fetch(`${API_USERS}/${id}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!res.ok) {
          alert("Usuario no encontrado.");
          return;
        }

        const u = await res.json();

        identificacion.value = u.identificacion;
        nombres.value = u.nombres;
        email.value = u.email;

        // CORRECCIÓN REAL: Admin = 1, Vendedor = 2
        rol.value = u.rol === "Admin" ? 1 : 2;

        modal.classList.remove("hidden");
      } catch (error) {
        console.error('Error al cargar usuario:', error);
        alert("Error al cargar los datos del usuario.");
      }
    }

    // ---------------------------
    // Cambiar estado
    // ---------------------------
    async function cambiarEstado(id) {
      if (!confirm("¿Estás seguro de que deseas cambiar el estado de este usuario?")) {
        return;
      }

      try {
        const res = await fetch(`${API_USERS}/${id}/estado`, {
          method: "PATCH",
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (res.ok) {
          cargarUsuarios();
        } else {
          alert("Error cambiando estado del usuario.");
        }
      } catch (error) {
        console.error('Error cambiando estado:', error);
        alert("Error de conexión con el servidor.");
      }
    }

    // ---------------------------
    // Guardar / actualizar
    // ---------------------------
    usuarioForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const submitBtn = usuarioForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      
      // Mostrar estado de carga
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <div class="h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        Guardando...
      `;

      try {
        const body = {
          identificacion: identificacion.value,
          nombres: nombres.value,
          email: email.value,
          password: password.value,
          rol: Number(rol.value) // <-- ENVÍA 1 O 2
        };

        let url = "";
        let method = "";

        if (editId) {
          url = `${API_USERS}/${editId}`;
          method = "PUT";
        } else {
          url = `${API_SEG}/registrar`;
          method = "POST";
        }

        const res = await fetch(url, {
          method,
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          alert(editId ? "✅ Usuario actualizado correctamente." : "✅ Usuario registrado. Debe verificar su correo.");
          modal.classList.add("hidden");
          cargarUsuarios();
        } else {
          const err = await res.json();
          alert("❌ Error: " + (err.mensaje || JSON.stringify(err)));
        }
      } catch (error) {
        console.error('Error al guardar:', error);
        alert("❌ Error de conexión con el servidor");
      } finally {
        // Restaurar botón
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // ---------------------------
    // Logout
    // ---------------------------
    document.getElementById("logout").onclick = () => {
      localStorage.removeItem("smartbook_auth");
      sessionStorage.removeItem("smartbook_auth");
      window.location.href = "index.html";
    };

    // ---------------------------
    // Inicialización
    // ---------------------------
    cargarUsuarios();

    // Exponer funciones globales
    window.editarUsuario = editarUsuario;
    window.cambiarEstado = cambiarEstado;
  </script>
  <script src="js/auth.js"></script>


</body>
</html>
