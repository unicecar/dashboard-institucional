<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer Contraseña – SmartBook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS con configuración personalizada -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>

  <style>
    @keyframes fadeInUp { 
      from { opacity:0; transform:translateY(30px) }
      to   { opacity:1; transform:translateY(0) }
    }
    @keyframes fadeIn { 
      from { opacity:0 }
      to   { opacity:1 }
    }
    @keyframes slideDown { 
      from { opacity:0; transform:translateY(-10px) }
      to   { opacity:1; transform:translateY(0) }
    }

    body {
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                  url('/slide-1.jpeg') no-repeat center center fixed;
      background-size: cover;
    }

    .card-shadow {
      box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.25);
      animation: fadeInUp 0.6s ease-out;
    }

    .logo-animate { animation: fadeIn 0.8s ease-out; }
    .form-animate { animation: fadeIn 1s ease-out 0.2s both; }
    .footer-animate { animation: fadeIn 1.2s ease-out 0.4s both; }

    .input-focus {
      transition: all 0.3s ease;
    }
    .input-focus:focus {
      border-color: #e12d2e;
      box-shadow: 0 0 0 3px rgba(225, 45, 46, 0.1);
      transform: translateY(-2px);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">

      <!-- CARD -->
      <div class="bg-white/95 backdrop-blur-sm card-shadow rounded-2xl p-8">

        <!-- LOGO -->
        <div class="flex flex-col items-center mb-8 logo-animate">
          <img src="images/logocecar.png" class="h-12 w-auto mb-4">
          <h1 class="text-xl font-bold text-gray-700">Restablecer Contraseña</h1>
        </div>

        <!-- ERROR -->
        <div id="errorBox"
             class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
             style="animation: slideDown 0.3s ease-out;">
          <span id="errorMessage">Error al procesar la solicitud.</span>
        </div>

        <!-- SUCCESS -->
        <div id="successBox"
             class="hidden mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700"
             style="animation: slideDown 0.3s ease-out;">
          <span id="successMessage">Solicitud procesada correctamente.</span>
        </div>

        <!-- FORM 1 — Solicitud -->
        <form id="requestForm" class="space-y-5 form-animate">
          <p class="text-sm text-gray-600 text-center">
            Ingresa tu correo institucional (@cecar.edu.co).
          </p>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
            <input id="email" type="email" required
                   class="input-focus w-full p-3 border border-gray-300 rounded-lg"
                   placeholder="usuario@cecar.edu.co" />
          </div>

          <button type="submit" id="submitRequest"
                  class="w-full flex items-center justify-center gap-2 rounded-lg bg-primary px-4 py-3 
                         text-white text-sm font-semibold shadow-md hover:bg-red-600 transition">
            <span id="submitRequestText">Enviar Enlace de Restablecimiento</span>
            <span id="submitRequestSpinner"
                  class="hidden h-4 w-4 border-2 border-white/60 border-t-transparent rounded-full animate-spin"></span>
          </button>
        </form>

        <!-- FORM 2 — Restablecer contraseña -->
        <form id="resetForm" class="hidden space-y-5 form-animate">

          <p class="text-sm text-gray-600 text-center">Establece tu nueva contraseña</p>

          <div>
            <label class="text-sm font-medium text-gray-700">Nueva contraseña</label>
            <input id="newPassword" type="password" minlength="6" required
                   class="input-focus w-full p-3 border border-gray-300 rounded-lg"
                   placeholder="••••••••">
          </div>

          <div>
            <label class="text-sm font-medium text-gray-700">Confirmar contraseña</label>
            <input id="confirmPassword" type="password" minlength="6" required
                   class="input-focus w-full p-3 border border-gray-300 rounded-lg"
                   placeholder="••••••••">
          </div>

          <div class="flex gap-3">
            <button type="button" id="backToRequest"
                    class="flex-1 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
              Volver
            </button>

            <button type="submit" id="submitReset"
                    class="flex-1 flex items-center justify-center gap-2 rounded-lg bg-primary px-4 py-3
                           text-white text-sm font-semibold shadow-md hover:bg-red-600 transition">
              <span id="submitResetText">Restablecer Contraseña</span>
              <span id="submitResetSpinner"
                    class="hidden h-4 w-4 border-2 border-white/60 border-t-transparent rounded-full animate-spin"></span>
            </button>
          </div>
        </form>

        <!-- VOLVER -->
        <div class="text-center mt-6">
          <a href="index.html" class="text-primary hover:text-red-600 transition-colors font-medium text-sm">
            ← Volver al inicio de sesión
          </a>
        </div>
      </div>

      <footer class="text-center py-4 footer-animate">
        <p class="text-sm text-white/90">© <span id="year"></span> SmartBook · CDI CECAR</p>
      </footer>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const API_BASE_URL = "https://smartbook.runasp.net";

    const requestForm = document.getElementById("requestForm");
    const resetForm = document.getElementById("resetForm");

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");
    const errorMsg = document.getElementById("errorMessage");
    const successMsg = document.getElementById("successMessage");

    const token = new URLSearchParams(window.location.search).get("token");

    document.getElementById("year").textContent = new Date().getFullYear();

    if (token) showResetForm();

    function showRequestForm() {
      requestForm.classList.remove("hidden");
      resetForm.classList.add("hidden");
      hideMessages();
    }

    function showResetForm() {
      requestForm.classList.add("hidden");
      resetForm.classList.remove("hidden");
      hideMessages();
    }

    function hideMessages() {
      errorBox.classList.add("hidden");
      successBox.classList.add("hidden");
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove("hidden");
      successBox.classList.add("hidden");
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successBox.classList.remove("hidden");
      errorBox.classList.add("hidden");
    }

    function setLoading(buttonId, state) {
      const btn = document.getElementById(buttonId);
      const txt = document.getElementById(buttonId + "Text");
      const spn = document.getElementById(buttonId + "Spinner");

      if (!btn || !txt || !spn) return;

      if (state) {
        btn.disabled = true;
        txt.textContent = "Procesando...";
        spn.classList.remove("hidden");
      } else {
        btn.disabled = false;
        spn.classList.add("hidden");

        const startTexts = {
          submitRequest: "Enviar Enlace de Restablecimiento",
          submitReset: "Restablecer Contraseña"
        };

        txt.textContent = startTexts[buttonId] || "Continuar";
      }
    }

    // ====== Enviar solicitud ======
    requestForm.addEventListener("submit", async e => {
      e.preventDefault();
      hideMessages();
      setLoading("submitRequest", true);

      const email = document.getElementById("email").value.trim();

      if (!email.endsWith("@cecar.edu.co")) {
        showError("Solo correos institucionales (@cecar.edu.co)");
        return setLoading("submitRequest", false);
      }

      try {
        const resp = await fetch(`${API_BASE_URL}/api/Seguridad/solicitar-restablecimiento`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        setLoading("submitRequest", false);

        if (!resp.ok) {
          const err = await resp.json().catch(() => null);
          return showError(err?.mensaje || "Error al enviar la solicitud.");
        }

        showSuccess("Se ha enviado un enlace a tu correo.");

      } catch {
        showError("Error al conectar con el servidor.");
        setLoading("submitRequest", false);
      }
    });

    // ====== Restablecer contraseña ======
    resetForm.addEventListener("submit", async e => {
      e.preventDefault();
      hideMessages();

      const pass = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (!token) return showError("Token inválido.");
      if (pass !== confirm) return showError("Las contraseñas no coinciden.");
      if (pass.length < 6) return showError("Debe tener mínimo 6 caracteres.");

      setLoading("submitReset", true);

      try {
        const resp = await fetch(`${API_BASE_URL}/api/Seguridad/restablecer-contrasena`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword: pass })
        });

        setLoading("submitReset", false);

        if (!resp.ok) {
          const err = await resp.json().catch(() => null);
          return showError(err?.mensaje || "No se pudo restablecer la contraseña.");
        }

        showSuccess("Contraseña cambiada correctamente. Redirigiendo...");
        setTimeout(() => (window.location.href = "index.html"), 3000);

      } catch {
        showError("Error de conexión.");
        setLoading("submitReset", false);
      }
    });

    document.getElementById("backToRequest").onclick = showRequestForm;
  </script>


</body>
</html>
