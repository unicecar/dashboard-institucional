  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .card-shadow {
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
      animation: fadeInUp 0.6s ease-out;

    .logo-animate {
      animation: fadeIn 0.8s ease-out;
    }
    
    .input-focus { transition: all 0.3s ease; }
    
    .input-focus:focus {
      border-color: #e12d2e;
      box-shadow: 0 0 0 3px rgba(225, 45, 46, 0.1);
      transform: translateY(-2px);
    }
    
    .sidebar-link { transition: all 0.2s ease; }
    
    .sidebar-link:hover { transform: translateX(5px); }
    
    .btn-primary { transition: all 0.3s ease; }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px -3px rgba(225, 45, 46, 0.3);
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- Botón hamburguesa -->

  <!-- ========================= -->
  <!-- Protección de página -->
  <!-- ========================= -->
  <script>
    const auth =
      JSON.parse(localStorage.getItem("smartbook_auth")) ||
      JSON.parse(sessionStorage.getItem("smartbook_auth"));

    // Si no existe usuario → redirigir
    if (!auth || !auth.token) {
      window.location.href = "index.html";
    } else {
      const ahora = Date.now();
      const expira = Number(auth.expiracion || 0);

      // Si expiró → limpiar y enviar al login
      if (ahora >= expira) {
        localStorage.removeItem("smartbook_auth");
        sessionStorage.removeItem("smartbook_auth");
        alert("Tu sesión ha expirado. Por favor inicia sesión nuevamente.");
        window.location.href = "index.html";
      }
    }
  </script>

              <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>

    <!-- ========================================================= -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- ========================================================= -->
<main class="sm:ml-64 p-4 sm:p-8 w-full">

      <header class="flex justify-between items-center mb-8">

          <h2 class="text-3xl font-bold text-gray-700">Gestión de Clientes</h2>
          <p class="text-gray-500 text-sm">Administra los clientes del sistema SmartBook</p>
        </div>

        <button id="openModalBtn"
          class="btn-primary px-5 py-3 bg-primary text-white font-semibold rounded-lg shadow flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nuevo Cliente
        </button>
      </header>

      <!-- BUSCADOR -->
      <div class="mb-6 relative">
        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <input id="searchInput"
          class="input-focus w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg"
          placeholder="Buscar por identificación o nombre..." />
      </div>

      <!-- TABLA -->
      <div class="bg-white card-shadow rounded-xl overflow-hidden">

                <th class="p-4 font-semibold">Identificación</th>
                <th class="p-4 font-semibold">Nombre</th>
                <th class="p-4 font-semibold">Email</th>
                <th class="p-4 font-semibold">Celular</th>
                <th class="p-4 font-semibold">Acciones</th>
              </tr>
            </thead>

            <tbody id="clientesTable" class="divide-y">
              <tr>
                <td colspan="5" class="p-8 text-center text-gray-500">
                  
                  <div class="flex justify-center">
                    <div class="h-8 w-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>

  <!-- ========================================================= -->
  <!-- MODAL -->
  <!-- ========================================================= -->
  <div id="modal"
    class="hidden fixed inset-0 bg-black/50 flex justify-center items-center z-50 backdrop-blur-sm p-4"
    style="animation: fadeIn 0.3s ease-out;">

    <div class="bg-white w-full max-w-lg rounded-xl shadow-xl overflow-hidden"
         style="animation: slideDown 0.3s ease-out;">
      
      <div class="bg-primary text-white p-6">
        <h3 id="modalTitle" class="text-xl font-bold">Registrar Cliente</h3>
      </div>

      <form id="clienteForm" class="p-6 space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Identificación</label>
          <input id="identificacion" class="input-focus w-full p-3 border border-gray-300 rounded-lg" placeholder="Número de identificación" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nombres completos</label>
          <input id="nombres" class="input-focus w-full p-3 border border-gray-300 rounded-lg" placeholder="Nombres y apellidos" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Correo electrónico</label>
          <input id="email" type="email" class="input-focus w-full p-3 border border-gray-300 rounded-lg" placeholder="correo@ejemplo.com" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Celular</label>
          <input id="celular" class="input-focus w-full p-3 border border-gray-300 rounded-lg" placeholder="Número de celular" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Fecha de nacimiento</label>
          <input id="fechaNacimiento" type="date" class="input-focus w-full p-3 border border-gray-300 rounded-lg" required>
        </div>

        <div class="flex justify-end gap-3 pt-4">
          <button type="button" id="closeModalBtn" 
                  class="px-5 py-2.5 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
            Cancelar
          </button>
          <button type="submit" 
                  class="btn-primary px-5 py-2.5 bg-primary text-white rounded-lg shadow">
            Guardar Cliente
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- ========================================================= -->
  <!-- SCRIPTS -->
  <!-- ========================================================= -->
  <script>
    const API_URL = "https://smartbook.runasp.net/api/Clientes";
    const token = auth.token;

    const clientesTable = document.getElementById("clientesTable");
    const searchInput = document.getElementById("searchInput");

    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const openModalBtn = document.getElementById("openModalBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const form = document.getElementById("clienteForm");
    const identificacion = document.getElementById("identificacion");
    const nombres = document.getElementById("nombres");
    const email = document.getElementById("email");
    const celular = document.getElementById("celular");
    const fechaNacimiento = document.getElementById("fechaNacimiento");

    let modoEdicion = false;
    let identificacionOriginal = "";

    openModalBtn.onclick = () => {
      modoEdicion = false;
      modalTitle.textContent = "Registrar Cliente";
      identificacion.disabled = false;
      form.reset();
      modal.classList.remove("hidden");
    };

    closeModalBtn.onclick = () => modal.classList.add("hidden");

    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.add("hidden");
    });

    async function cargarClientes() {
      try {
        const res = await fetch(API_URL, { headers: { "Authorization": `Bearer ${token}` } });

        if (!res.ok) throw new Error('Error al cargar clientes');

        const data = await res.json();
        mostrarClientes(data);
      } catch (error) {
        console.error('Error:', error);
        clientesTable.innerHTML = `
          <tr>
            <td colspan="5" class="p-8 text-center text-red-500">
              <p>Error al cargar los clientes</p>
              <button onclick="cargarClientes()" class="mt-2 text-primary hover:underline">Reintentar</button>
            </td>
          </tr>
        `;
      }
    }

    function mostrarClientes(lista) {
      if (lista.length === 0) {
        clientesTable.innerHTML = `
          <tr>
            <td colspan="5" class="p-8 text-center text-gray-500">
              <p>No hay clientes registrados</p>
            </td>
          </tr>`;
        return;
      }

      clientesTable.innerHTML = "";

      lista.forEach(c => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50';

        tr.innerHTML = `
          <td class="p-4 font-medium">${c.identificacion}</td>
          <td class="p-4">${c.nombres}</td>
          <td class="p-4">${c.email}</td>
          <td class="p-4">${c.celular}</td>
          <td class="p-4">
            <button class="text-primary font-semibold hover:text-red-700" onclick="editarCliente('${c.identificacion}')">Editar</button>
          </td>
        `;
        clientesTable.appendChild(tr);
      });
    }

    searchInput.addEventListener("input", async () => {
      const texto = searchInput.value.toLowerCase();

      try {
        const res = await fetch(API_URL, { headers: { "Authorization": `Bearer ${token}` } });
        let data = await res.json();

        data = data.filter(c =>
          c.identificacion.toLowerCase().includes(texto) ||
          c.nombres.toLowerCase().includes(texto)
        );

        mostrarClientes(data);

      } catch (error) {
        console.error('Error al buscar:', error);
      }
    });

    async function editarCliente(identificacionCliente) {
      try {
        const res = await fetch(`${API_URL}/${identificacionCliente}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!res.ok) {
          alert("Cliente no encontrado.");
          return;
        }

        const c = await res.json();

        modoEdicion = true;
        identificacionOriginal = identificacionCliente;

        modalTitle.textContent = "Editar Cliente";

        identificacion.value = c.identificacion;
        nombres.value = c.nombres;
        email.value = c.email;
        celular.value = c.celular;
        fechaNacimiento.value = c.fechaNacimiento;

        identificacion.disabled = true;
        modal.classList.remove("hidden");
      } catch (error) {
        alert("Error al cargar cliente.");
      }
    }

    form.onsubmit = async (e) => {
      e.preventDefault();

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;

      submitBtn.disabled = true;
      submitBtn.textContent = "Guardando...";

      try {
        const datos = {
          nombres: nombres.value,
          email: email.value,
          celular: celular.value,
          fechaNacimiento: fechaNacimiento.value
        };

        let url = API_URL;
        let method = "POST";

        if (modoEdicion) {
          url = `${API_URL}/${identificacionOriginal}`;
          method = "PUT";
        } else {
          datos.identificacion = identificacion.value;
        }

        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(datos)
        });

        if (res.ok) {
          alert(modoEdicion ? "Cliente actualizado." : "Cliente registrado.");
          modal.classList.add("hidden");
          cargarClientes();
        } else {
          const error = await res.json();
          alert("Error: " + (error.message || "Operación fallida."));
        }

      } catch (error) {
        alert("Error de conexión.");
      }

      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    };

    document.getElementById("logout").onclick = () => {
      localStorage.removeItem("smartbook_auth");
      sessionStorage.removeItem("smartbook_auth");
      window.location.href = "index.html";
    };

    cargarClientes();
  </script>

  <!-- Auth universal -->
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>

</body>
